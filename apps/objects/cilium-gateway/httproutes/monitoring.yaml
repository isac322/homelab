apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: prometheus
spec:
  parentRefs:
    - name: bhyoo-gateway
      namespace: ingress-ctrl
  hostnames:
    - grafana.bhyoo.com
  rules:
    - backendRefs:
        - name: shared-grafana
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: prometheus
spec:
  parentRefs:
    - name: bhyoo-gateway
      namespace: ingress-ctrl
  hostnames:
    - prometheus.bhyoo.com
  rules:
    - backendRefs:
        - name: shared-prometheus
          port: 9090
