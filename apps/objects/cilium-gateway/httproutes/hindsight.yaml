apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight
  namespace: hindsight
spec:
  parentRefs:
    - name: bhyoo-gateway
      namespace: ingress-ctrl
  hostnames:
    - hindsight.bhyoo.com
  rules:
    - backendRefs:
        - name: hindsight-control-plane
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight-api
  namespace: hindsight
spec:
  parentRefs:
    - name: bhyoo-gateway
      namespace: ingress-ctrl
  hostnames:
    - hindsight-api.bhyoo.com
  rules:
    - backendRefs:
        - name: hindsight-api
          port: 8888
