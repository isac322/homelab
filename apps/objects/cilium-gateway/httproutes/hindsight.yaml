apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight
  namespace: hindsight
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bhyoo-gateway
      namespace: ingress-ctrl
  hostnames:
    - hindsight.bhyoo.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: hindsight-control-plane
          port: 3000
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight-api
  namespace: hindsight
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: bhyoo-gateway
      namespace: ingress-ctrl
  hostnames:
    - hindsight-api.bhyoo.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: hindsight-api
          port: 8888
          weight: 1
