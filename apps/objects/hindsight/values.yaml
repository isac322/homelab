# Hindsight — AI Agent Memory Server

api:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  env:
    # LLM — Vertex AI (SA key via GOOGLE_APPLICATION_CREDENTIALS)
    # SA key Secret (hindsight-gcp-sa-key) created by ExternalSecret.
    # TODO: mount as volume + set HINDSIGHT_API_LLM_VERTEXAI_SERVICE_ACCOUNT_KEY
    #       once chart supports extraVolumes (vectorize-io/hindsight#861)
    HINDSIGHT_API_LLM_PROVIDER: "vertexai"
    HINDSIGHT_API_LLM_MODEL: "gemini-3.1-pro-preview"
    HINDSIGHT_API_LLM_VERTEXAI_PROJECT_ID: "runbear"
    HINDSIGHT_API_LLM_VERTEXAI_REGION: "global"
    # Vector extension
    HINDSIGHT_API_VECTOR_EXTENSION: "vchord"
    # Retain
    HINDSIGHT_API_RETAIN_EXTRACTION_MODE: "verbose"
    # Embeddings — OpenAI
    HINDSIGHT_API_EMBEDDINGS_PROVIDER: "openai"
    HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: "text-embedding-3-large"
    # Reranker — local model
    HINDSIGHT_API_RERANKER_LOCAL_MODEL: "BAAI/bge-reranker-v2-m3"
    # Startup timeout — model download can take >5min on cold start
    HINDSIGHT_API_STARTUP_WAIT_SECONDS: "600"
  livenessProbe:
    httpGet:
      path: /health
      port: 8888
    initialDelaySeconds: 300
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    httpGet:
      path: /health
      port: 8888
    initialDelaySeconds: 60
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

controlPlane:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

worker:
  enabled: false

postgresql:
  enabled: false
  external:
    host: cnpg-hindsight-rw.hindsight.svc
    port: 5432
    database: hindsight
    username: hindsight

existingSecret: hindsight-secrets

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: cluster-issuer-acme
    cert-manager.io/private-key-algorithm: ECDSA
    cert-manager.io/private-key-size: "384"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: hindsight.bhyoo.com
      paths:
        - path: /
          pathType: Prefix
          service: controlPlane
    - host: hindsight-api.bhyoo.com
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls:
    - hosts:
        - hindsight.bhyoo.com
      secretName: hindsight-bhyoo-com
    - hosts:
        - hindsight-api.bhyoo.com
      secretName: hindsight-api-bhyoo-com
