apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hindsight-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes
    kind: SecretStore
  target:
    name: hindsight-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        postgres-password: "{{ .pg_password }}"
        HINDSIGHT_API_EMBEDDINGS_OPENAI_API_KEY: "{{ .openai_key }}"
        HINDSIGHT_API_LLM_API_KEY: "{{ .gemini_key }}"
  data:
    # PG password from CNPG-generated superuser secret
    - secretKey: pg_password
      remoteRef:
        key: cnpg-hindsight-app
        property: password
    # OpenAI key from ClusterSecretStore (AWS SSM)
    - secretKey: openai_key
      sourceRef:
        storeRef:
          name: cluster-secrets
          kind: ClusterSecretStore
      remoteRef:
        key: /homelab/cluster/backbone/token/openai/hindsight-embeddings
    # Google AI Studio (Gemini) API key for LLM
    - secretKey: gemini_key
      sourceRef:
        storeRef:
          name: cluster-secrets
          kind: ClusterSecretStore
      remoteRef:
        key: /homelab/cluster/backbone/token/google/hindsight-llm
---
# GCP SA key for Vertex AI — stored separately for volume mount
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hindsight-gcp-sa-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secrets
    kind: ClusterSecretStore
  target:
    name: hindsight-gcp-sa-key
    creationPolicy: Owner
  data:
    - secretKey: sa-key.json
      remoteRef:
        key: /homelab/cluster/backbone/hindsight/gcp-vertex-ai-sa-key
