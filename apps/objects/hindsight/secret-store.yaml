apiVersion: v1
kind: ServiceAccount
metadata:
  name: cosi-secret-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cosi-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cosi-secret-reader
subjects:
  - kind: ServiceAccount
    name: cosi-secret-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cosi-secret-reader
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kubernetes
spec:
  provider:
    kubernetes:
      remoteNamespace: hindsight
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: cosi-secret-reader
