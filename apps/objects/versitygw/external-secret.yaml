apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: versitygw-access-key
spec:
  length: 20
  noUpper: false
  allowRepeat: true
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: versitygw-secret-key
spec:
  length: 40
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: versitygw-root-credentials
spec:
  refreshInterval: "0"
  target:
    name: versitygw-root-credentials
    creationPolicy: Orphan
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: versitygw-access-key
      rewrite:
        - regexp:
            source: ".*"
            target: rootAccessKeyId
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: versitygw-secret-key
      rewrite:
        - regexp:
            source: ".*"
            target: rootSecretAccessKey
