apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: networking
spec:
  description: Cluster networking foundation (CNI, KPR, Gateway API, Hubble)
  sourceRepos:
    - https://helm.cilium.io/
    - https://github.com/isac322/homelab.git
  destinations:
    - namespace: kube-system
      name: backbone
    - namespace: cilium-secrets
      name: backbone
    - namespace: ingress-ctrl
      name: backbone
    - namespace: hindsight
      name: backbone
    - namespace: immich
      name: backbone
    - namespace: object-storage
      name: backbone
    - namespace: prometheus
      name: backbone
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
