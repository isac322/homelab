apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backbone-cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: backbone
    namespace: kube-system
  project: networking
  sources:
    - repoURL: https://github.com/isac322/homelab.git
      targetRevision: HEAD
      ref: homelab
    - chart: cilium
      repoURL: https://helm.cilium.io/
      targetRevision: 1.19.3
      helm:
        releaseName: cilium
        valueFiles:
          - $homelab/values/cilium/backbone.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: -1
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # Cilium operator가 런타임에 생성하는 CRD와 annotation 무시
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .metadata.annotations["io.cilium/autogenerated"]
