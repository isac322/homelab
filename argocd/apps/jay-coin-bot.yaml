apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jay-india
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: prod
    namespace: jay-india
  project: jay-india
  sources:
    - repoURL: https://github.com/isac322/homelab.git
      targetRevision: HEAD
      ref: homelab
    - chart: coin-bot
      helm:
        valueFiles:
          - values.yaml
          - $homelab/values/jay-coin-bot/backbone.yaml
        parameters:
          - name: image.tag
            value: 0.1.0
      repoURL: ghcr.io/jayjeong8/charts
      targetRevision: 0.1.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - CreateNamespace=true
---