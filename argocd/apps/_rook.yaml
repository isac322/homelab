      targetRevision: HEAD
      ref: homelab
    - chart: rook-ceph-cluster
      helm:
        valueFiles:
          - values.yaml
          - $homelab/values/rook/cluster.prod.yaml
      repoURL: https://charts.rook.io/release
      targetRevision: v1.12.5
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - CreateNamespace=true
