apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: prod
    namespace: rook-ceph
  project: dfs
  sources:
    - repoURL: https://github.com/isac322/homelab.git
      targetRevision: HEAD
      ref: homelab
    - chart: rook-ceph
      helm:
        releaseName: rook-ceph
        valueFiles:
          - values.yaml
          - $homelab/values/rook/operator.prod.yaml
      repoURL: https://charts.rook.io/release
      targetRevision: v1.12.5
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-cluster
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: prod
    namespace: rook-ceph
  project: dfs
  sources:
