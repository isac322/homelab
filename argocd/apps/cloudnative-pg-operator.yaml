apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: backbone
    namespace: cnpg-system
  project: cloudnative-pg
  sources:
    - repoURL: https://github.com/isac322/homelab.git
      targetRevision: HEAD
      ref: homelab
    - chart: cloudnative-pg
      helm:
        valueFiles:
          - values.yaml
          - $homelab/values/cloudnative-pg/operator.yaml
      repoURL: https://cloudnative-pg.github.io/charts/
      targetRevision: 0.28.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
