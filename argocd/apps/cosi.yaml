apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cosi
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: backbone
    namespace: object-storage
  project: object-storage
  source:
    repoURL: https://github.com/kubernetes-sigs/container-object-storage-interface.git
    path: .
    targetRevision: v0.2.2
    kustomize:
      namespace: object-storage
      patches:
        - target:
            kind: Deployment
            name: container-object-storage-controller
          patch: |
            - op: add
              path: /spec/template/spec/containers/0/resources
              value:
                requests:
                  cpu: 5m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
