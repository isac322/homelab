apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-dashboard
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: backbone
    namespace: prometheus
  project: monitoring
  sources:
    - repoURL: https://github.com/isac322/homelab.git
      targetRevision: HEAD
      path: apps/objects/cnpg-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - ServerSideApply=true
