apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: backbone
    namespace: kube-system
  project: monitoring
  sources:
    - repoURL: https://github.com/isac322/homelab.git
      targetRevision: HEAD
      ref: homelab
    - chart: alloy
      helm:
        releaseName: alloy
        valueFiles:
          - values.yaml
          - $homelab/values/alloy/backbone.yaml
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.7.0
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: alloy
      jqPathExpressions:
        # Ignore k8s API server defaults that are not set by the chart
        - .spec.persistentVolumeClaimRetentionPolicy
        - .spec.revisionHistoryLimit
        - .spec.updateStrategy
        - .spec.template.spec.restartPolicy
        - .spec.template.spec.schedulerName
        - .spec.template.spec.securityContext
        - .spec.template.spec.serviceAccount
        - .spec.template.spec.terminationGracePeriodSeconds
        - .spec.template.spec.containers[].terminationMessagePath
        - .spec.template.spec.containers[].terminationMessagePolicy
        - .spec.template.spec.containers[].env[].valueFrom.fieldRef.apiVersion
        - .spec.template.spec.containers[].ports[].protocol
        - .spec.template.spec.containers[].readinessProbe.failureThreshold
        - .spec.template.spec.containers[].readinessProbe.periodSeconds
        - .spec.template.spec.containers[].readinessProbe.successThreshold
        - .spec.template.spec.volumes[].configMap.defaultMode
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
        - .spec.volumeClaimTemplates[].spec.volumeMode
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
