apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimir
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: prod
    namespace: mimir
  project: monitoring
  sources:
    - repoURL: https://github.com/isac322/homelab.git
      targetRevision: HEAD
      ref: homelab
    - chart: mimir-distributed
      helm:
        releaseName: mimir
        valueFiles:
          - values.yaml
          - $homelab/values/mimir/prod.yaml
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 5.1.1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
      limit: 100
    syncOptions:
      - CreateNamespace=true
