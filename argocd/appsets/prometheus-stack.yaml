apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prometheus-stack
spec:
  generators:
    - list:
        elements:
          - cluster: backbone
          - cluster: prod
  template:
    metadata:
      name: '{{cluster}}-prometheus-stack'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      destination:
        name: '{{cluster}}'
        namespace: prometheus
      project: monitoring
      sources:
        - repoURL: https://github.com/isac322/homelab.git
          targetRevision: HEAD
          ref: homelab
        - chart: kube-prometheus-stack
          helm:
            releaseName: shared
            valueFiles:
              - values.yaml
              - '$homelab/values/kube-prometheus-stack/{{cluster}}.yaml'
          repoURL: https://prometheus-community.github.io/helm-charts
          targetRevision: 82.15.1
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m0s
          limit: -1
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
