global:
  security:
    allowInsecureImages: true

image:
  registry: quay.io
  repository: thanos/thanos
  tag: v0.41.0

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

existingObjstoreSecret: thanos-objstore-config
existingObjstoreSecretItems:
  - key: objstore.yml
    path: objstore.yml

query:
  enabled: true
  replicaCount: 1
  stores:
    - dnssrv+_grpc._tcp.prometheus-operated.prometheus.svc.cluster.local
  replicaLabels:
    - prometheus_replica
  extraFlags:
    - --query.auto-downsampling
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi

queryFrontend:
  enabled: true
  replicaCount: 1
  extraFlags:
    - --query-range.split-interval=24h
    - --labels.split-interval=24h
    - --query-range.max-retries-per-request=3
    - --query-range.request-downsampled
    - --query-frontend.compress-responses
    - --cache-compression-type=snappy
    - --query-range.response-cache-config={"type":"in-memory","config":{"max-size":"256MB","max-item-size":"10MB","validity":"6h"}}
    - --labels.response-cache-config={"type":"in-memory","config":{"max-size":"32MB","max-item-size":"1MB","validity":"6h"}}
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 768Mi

storegateway:
  enabled: true
  replicaCount: 1
  extraFlags:
    - --index-cache-size=512MB
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: ssd-ha-xfs
    size: 8Gi

compactor:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    enabled: true
    storageClass: ssd-ha-xfs
    size: 16Gi
  retentionResolutionRaw: 30d
  retentionResolution5m: 180d
  retentionResolution1h: 0d

ruler:
  enabled: false
receive:
  enabled: false
receiveDistributor:
  enabled: false
bucketweb:
  enabled: false
