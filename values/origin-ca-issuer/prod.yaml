# Value specific to the origin-ca-issuer controller
controller:
  # Optional deployment rollout strategy.
  # ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 16Mi
