driver:
  name: versitygw-hdd.cosi.dev
  # Chart 0.3.7 ships Chart.AppVersion=0.3.7 but no image 0.3.7 was published;
  # explicitly pin to the released app image (0.4.0).
  image:
    tag: "0.4.0"
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

bucketClass:
  name: versitygw-hdd-cosi-driver

bucketAccessClass:
  name: versitygw-hdd-cosi-driver

versitygw:
  serviceName: "versitygw-hdd"
  credentials:
    secretName: "versitygw-hdd-root-credentials"

sidecar:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
