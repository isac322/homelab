## CRD upgrade job to avoid ServerSideApply timeout on large CRDs
##
crds:
  upgradeJob:
    enabled: true
    forceConflicts: true

nameOverride: shared

## Configuration for alertmanager
## ref: https://prometheus.io/docs/alerting/alertmanager/
##
alertmanager:
  enabled: false

## Using default values from https://github.com/grafana/helm-charts/blob/main/charts/grafana/values.yaml
##
grafana:
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  grafana.ini:
    date_formats:
      default_timezone: Asia/Seoul

  ## Timezone for the default dashboards
  ## Other options are: browser or a specific timezone, i.e. Europe/Luxembourg
  ##
  defaultDashboardsTimezone: Asia/Seoul

  ingress:
    enabled: true
    ingressClassName: traefik

    annotations:
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
      cert-manager.io/cluster-issuer: cluster-issuer-acme
      cert-manager.io/private-key-algorithm: ECDSA
      cert-manager.io/private-key-size: '384'
      traefik.ingress.kubernetes.io/router.entrypoints: websecure

    hosts:
      - grafana.bhyoo.com

    ## Path for grafana ingress
    path: /

    tls:
      - secretName: grafana-general-tls
        hosts:
          - grafana.bhyoo.com

  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 384Mi

  sidecar:
    resources:
      requests:
        cpu: 20m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 192Mi
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      # Allow discovery in all namespaces for dashboards
      searchNamespace: ALL

      multicluster:
        global:
          enabled: true
        etcd:
          enabled: true
    datasources:
      enabled: true
      defaultDatasourceEnabled: false

      label: grafana_datasource
      labelValue: "1"

      alertmanager:
        enabled: false

  additionalDataSources:
    - name: Thanos
      uid: prometheus
      type: prometheus
      access: proxy
      url: http://thanos-query-frontend.prometheus.svc.cluster.local:9090
      isDefault: true
      editable: true
      jsonData:
        httpMethod: POST
        timeInterval: 30s
        timeout: 120
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki-gateway.loki.svc.cluster.local
      isDefault: false
      editable: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: community
          orgId: 1
          folder: Community
          type: file
          disableDeletion: true
          editable: false
          options:
            path: /var/lib/grafana/dashboards/community

  dashboards:
    community:
      node-exporter-full:
        gnetId: 1860
        revision: 42
        datasource: Prometheus
      traefik:
        gnetId: 17346
        revision: 9
        datasource: Prometheus
      argocd:
        gnetId: 14584
        revision: 1
        datasource: Prometheus
      cert-manager:
        gnetId: 20842
        revision: 3
        datasource: Prometheus
      loki:
        gnetId: 17781
        revision: 1
        datasource: Prometheus

## In K3s, apiserver /metrics exposes kubelet metrics (single binary).
## Drop only kubelet-specific metrics (already scraped via kubelet job).
## Keep scheduler/proxy/k3s metrics here since their standalone scrapes are disabled.
kubeApiServer:
  serviceMonitor:
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: kubelet_.*|volume_manager_.*|volume_operation_.*|storage_operation_.*|csi_operations_.*|plugin_manager_.*|reconstruct_volume_.*|dra_operations_.*|dra_resource_.*
        action: drop

## Component scraping the kubelet and kubelet-hosted cAdvisor
##
kubelet:
  serviceMonitor:
    attachMetadata:
      node: true

    ## In K3s, kubelet /metrics exposes all control-plane metrics (single binary).
    ## Drop non-kubelet metrics to avoid duplication with apiserver/scheduler/proxy scrapes.
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: apiserver_.*|apiextensions_.*|aggregator_.*|authenticated_.*|authentication_.*|authorization_.*|etcd_.*|grpc_client_.*|scheduler_.*|kubeproxy_.*|kube_apiserver_.*|kube_router_.*|node_authorizer_.*|node_collector_.*|node_controller_.*|serviceaccount_.*|watch_cache_.*|field_validation_.*|force_cleaned_.*|pod_security_.*|session_server_.*|lasso_.*
        action: drop

## K3s bundles all control plane components into a single binary, so
## kube-proxy, kube-controller-manager, and kube-scheduler do not expose
## separate metrics endpoints. Their metrics are already collected via the
## apiserver job.
kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false

## etcd metrics are scraped via additionalScrapeConfigs (node SD) instead of
## the default ServiceMonitor, because K3s has no component=etcd Pod.
## Keep kubeEtcd enabled for the dashboard and alert rules only.
kubeEtcd:
  enabled: true
  service:
    enabled: false
  serviceMonitor:
    enabled: false

## Configuration for kube-state-metrics subchart
##
kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

## Configuration for prometheus-node-exporter subchart
##
prometheus-node-exporter:
  nameOverride: node-exporter
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

## Manages Prometheus and Alertmanager components
##
prometheusOperator:

  admissionWebhooks:
    annotations:
      argocd.argoproj.io/hook: PreSync
      argocd.argoproj.io/hook-delete-policy: HookSucceeded

    # Use certmanager to generate webhook certs
    certManager:
      enabled: true
      issuerRef:
        kind: ClusterIssuer
        name: cluster-issuer-self-signed

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  prometheusConfigReloader:
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 10m
        memory: 64Mi

## Deploy a Prometheus instance
##
prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik

    annotations:
      cert-manager.io/cluster-issuer: cluster-issuer-acme
      cert-manager.io/private-key-algorithm: ECDSA
      cert-manager.io/private-key-size: '384'
      traefik.ingress.kubernetes.io/router.entrypoints: websecure

    hosts:
      - prometheus.bhyoo.com

    tls:
      - secretName: prometheus-general-tls
        hosts:
          - prometheus.bhyoo.com

  prometheusSpec:
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false

    scrapeClasses:
      - name: default
        default: true
        metricRelabelings:
          - sourceLabels: [cluster]
            regex: "^$"
            targetLabel: cluster
            replacement: backbone
            action: replace

    ## External labels to add to any time series or alerts when communicating with external systems
    ##
    externalLabels:
      cluster: backbone

    ## enable --web.enable-remote-write-receiver flag on prometheus-server
    ##
    enableRemoteWriteReceiver: true

    ## How long to retain metrics
    ##
    retention: 30d

    thanos:
      resources:
        requests:
          cpu: 10m
          memory: 48Mi
        limits:
          cpu: 200m
          memory: 768Mi
      objectStorageConfig:
        existingSecret:
          name: thanos-objstore-config
          key: objstore.yml

    ## Allow out-of-order/out-of-bounds samples ingested into Prometheus for a specified duration
    ## See https://prometheus.io/docs/prometheus/latest/configuration/configuration/#tsdb
    tsdb:
      outOfOrderTimeWindow: 5m

    ## Resource limits & requests
    ##
    resources:
      requests:
        cpu: 200m
        memory: 2048Mi
      limits:
        cpu: 2000m
        memory: 6Gi

    ## Prometheus StorageSpec for persistent data
    ## ref: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/user-guides/storage.md
    ##
    storageSpec:
      volumeClaimTemplate:
        metadata:
          annotations:
            democratic-csi.org/config: '{"zfs":{"zvolBlocksize":"16K","datasetProperties":{"compression":"lz4","dedup":"off","logbias":"throughput","sync":"standard","primarycache":"metadata","redundant_metadata":"most"}}}'
        spec:
          storageClassName: ssd-ha-xfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 256Gi

    ## Scrape etcd server metrics via Kubernetes node service discovery.
    ## K3s has no component=etcd Pod, so the kubeEtcd ServiceMonitor can't discover targets.
    ## Port 2381 is open on all control-plane nodes (etcd-expose-metrics: true in K3s config).
    ## The etcd port also exposes apiserver/containerd metrics, so we keep only etcd_*.
    ## job_name "etcd" matches the dashboard/alert pattern job=~".*etcd.*".
    additionalScrapeConfigs:
      - job_name: etcd
        scheme: http
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_label_node_role_kubernetes_io_etcd]
            action: keep
            regex: "true"
          - source_labels: [__address__]
            action: replace
            regex: (.+?)(?::\d+)?
            replacement: $1:2381
            target_label: __address__
          - target_label: cluster
            replacement: backbone
        metric_relabel_configs:
          - source_labels: [__name__]
            regex: etcd_.*
            action: keep

    securityContext:
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
      fsGroupChangePolicy: OnRootMismatch

cleanPrometheusOperatorObjectNames: true
