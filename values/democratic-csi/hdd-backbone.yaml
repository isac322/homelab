csiDriver:
  name: "org.democratic-csi.hdd-iscsi"

storageClasses:
  - name: hdd-ha-xfs
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: xfs
      democratic-csi.org/load-config-from-pvc: "true"

volumeSnapshotClasses: []

driver:
  config:
    driver: zfs-generic-iscsi
    sshConnection:
      host: rock5bp
      username: democratic-csi
      privateKey: "$SSH_PRIVATE_KEY"

    zfs:
      cli:
        sudoEnabled: true

      datasetParentName: nas/k8s
      detachedSnapshotsDatasetParentName: nas/k8s-snapshots

      zvolCompression: off
      zvolDedup: off
      zvolEnableReservation: false

    iscsi:
      shareStrategy: "targetCli"
      shareStrategyTargetCli:
        sudoEnabled: true
        basename: "iqn.2020-04.com.bhyoo.backbone"
        tpg:
          attributes:
            authentication: 0
            generate_node_acls: 1
            cache_dynamic_acls: 1
            demo_mode_write_protect: 0
        block:
          attributes:
            emulate_tpu: 0
      targetPortal: rock5bp:3260

csiProxy:
  resources:
    requests:
      cpu: 5m
      memory: 12Mi
    limits:
      cpu: 10m
      memory: 24Mi

controller:
  externalAttacher:
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  externalProvisioner:
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  externalResizer:
    resources:
      requests:
        cpu: 5m
        memory: 24Mi
      limits:
        cpu: 50m
        memory: 32Mi
  externalSnapshotter:
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  driver:
    image:
      registry: docker.io/isac322/democratic-csi
      tag: next
      pullPolicy: Always
    resources:
      requests:
        cpu: 15m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi
    extraEnv:
      - name: SSH_PRIVATE_KEY
        valueFrom:
          secretKeyRef:
            name: openssh-private-key
            key: ssh-privatekey

node:
  cleanup:
    resources:
      requests:
        cpu: 5m
        memory: 8Mi
      limits:
        cpu: 10m
        memory: 16Mi
  driverRegistrar:
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi
  driver:
    image:
      registry: docker.io/isac322/democratic-csi
      tag: next
      pullPolicy: Always
    resources:
      requests:
        cpu: 30m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    extraEnv:
      - name: SSH_PRIVATE_KEY
        valueFrom:
          secretKeyRef:
            name: openssh-private-key
            key: ssh-privatekey
