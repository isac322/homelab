gateway:
  corsAllowOrigin: "https://versitygw.bhyoo.com"
  backend:
    type: posix
    args: "/mnt/data"

admin:
  enabled: true

webui:
  enabled: true

iam:
  enabled: true

auth:
  existingSecret: versitygw-root-credentials

persistence:
  enabled: true
  create: false
  claimName: versitygw-data

ingress:
  enabled: true
  className: traefik
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    cert-manager.io/cluster-issuer: cluster-issuer-acme
    cert-manager.io/private-key-algorithm: ECDSA
    cert-manager.io/private-key-size: "384"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: versitygw.bhyoo.com
      paths:
        - path: /
          pathType: Prefix
          servicePort: webui
  tls:
    - secretName: versitygw-webui-tls
      hosts:
        - versitygw.bhyoo.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
