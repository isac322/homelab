# Hindsight — AI Agent Memory Server

api:
  replicaCount: 1
  image:
    tag: "0.5.4-slim"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  env:
    # LLM — Vertex AI (SA key via GOOGLE_APPLICATION_CREDENTIALS)
    HINDSIGHT_API_LLM_PROVIDER: "vertexai"
    HINDSIGHT_API_LLM_MODEL: "gemini-3.1-pro-preview"
    HINDSIGHT_API_LLM_VERTEXAI_PROJECT_ID: "runbear"
    HINDSIGHT_API_LLM_VERTEXAI_REGION: "global"
    # Vector extension
    HINDSIGHT_API_VECTOR_EXTENSION: "vchord"
    # Retain
    HINDSIGHT_API_RETAIN_EXTRACTION_MODE: "verbose"
    # Embeddings — OpenAI
    HINDSIGHT_API_EMBEDDINGS_PROVIDER: "openai"
    HINDSIGHT_API_EMBEDDINGS_OPENAI_MODEL: "text-embedding-3-large"
    # Reranker — Vertex AI Ranking via LiteLLM SDK
    HINDSIGHT_API_RERANKER_PROVIDER: "litellm-sdk"
    HINDSIGHT_API_RERANKER_LITELLM_SDK_MODEL: "vertex_ai/semantic-ranker-default-004"
    HINDSIGHT_API_RERANKER_LITELLM_SDK_API_KEY: "gcp-sa"  # placeholder — actual auth via GOOGLE_APPLICATION_CREDENTIALS
    # LiteLLM Vertex AI auth
    HINDSIGHT_API_LLM_VERTEXAI_SERVICE_ACCOUNT_KEY: "/etc/gcp/sa-key.json"
    GOOGLE_APPLICATION_CREDENTIALS: "/etc/gcp/sa-key.json"
    VERTEXAI_PROJECT: "runbear"
    VERTEXAI_LOCATION: "global"
  extraVolumes:
    - name: gcp-sa-key
      secret:
        secretName: hindsight-gcp-sa-key
  extraVolumeMounts:
    - name: gcp-sa-key
      mountPath: /etc/gcp
      readOnly: true
  livenessProbe:
    httpGet:
      path: /health
      port: 8888
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    httpGet:
      path: /health
      port: 8888
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 6

controlPlane:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

worker:
  enabled: false

postgresql:
  enabled: false
  external:
    host: cnpg-hindsight-rw.hindsight.svc
    port: 5432
    database: hindsight
    username: hindsight

existingSecret: hindsight-secrets

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: cluster-issuer-acme
    cert-manager.io/private-key-algorithm: ECDSA
    cert-manager.io/private-key-size: "384"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: hindsight.bhyoo.com
      paths:
        - path: /
          pathType: Prefix
          service: controlPlane
    - host: hindsight-api.bhyoo.com
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls:
    - hosts:
        - hindsight.bhyoo.com
      secretName: hindsight-bhyoo-com
    - hosts:
        - hindsight-api.bhyoo.com
      secretName: hindsight-api-bhyoo-com
