## This chart relies on the common library chart from bjw-s
## You can find it at https://github.com/bjw-s-labs/helm-charts/tree/common-4.3.0/charts/library/common
## Refer there for more detail about the supported values

# These entries are shared between all the Immich components

controllers:
  main:
    containers:
      main:
        image:
          tag: v3.0.3
        env:
          REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
          # Add the env vars to connect to your database here.
          DB_HOSTNAME:
            valueFrom:
              secretKeyRef:
                key: host
                name: cnpg-immich-superuser
          DB_PORT:
            valueFrom:
              secretKeyRef:
                key: port
                name: cnpg-immich-superuser
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                key: username
                name: cnpg-immich-superuser
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                key: password
                name: cnpg-immich-superuser
          DB_DATABASE_NAME: app
          TZ: Asia/Seoul

immich:
  metrics:
    # Enabling this will create the service monitors needed to monitor immich with the prometheus operator
    enabled: true
  persistence:
    # Main data store for all photos shared between different components.
    library:
      # Automatically creating the library volume is not supported by this chart
      # You have to specify an existing PVC to use
      existingClaim: immich-data
  # configuration is immich-config.json converted to yaml
  # ref: https://immich.app/docs/install/config-file/
  #
  configuration: {}
    # trash:
    #   enabled: false
    #   days: 30
    # storageTemplate:
    #   enabled: true
    #   template: "{{y}}/{{y}}-{{MM}}-{{dd}}/{{filename}}"

# Dependencies

valkey:
  enabled: true
  controllers:
    main:
      containers:
        main:
          resources:
            requests:
              cpu: 15m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
  persistence:
    data:
      enabled: true
      size: 1Gi
      # Optional: Set this to persistentVolumeClaim to keep job queues persistent
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: ssd-ha-xfs

# Immich components

server:
  enabled: true
  controllers:
    main:
      strategy: Recreate
      pod:
        nodeSelector:
          homelab.bhyoo.com/media-api: rkmpp
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            pullPolicy: IfNotPresent
          env:
            # Mali OpenCL shim (libMaliOpenCL.so.1) lives in /usr/lib/aarch64-linux-gnu/mali/
            # on Debian's libmali-valhall-* package layout. The container image has no
            # ldconfig and the host's /etc/ld.so.conf.d/00-aarch64-mali.conf is not mounted,
            # so the dynamic linker cannot find libMaliOpenCL.so.1 referenced by mali.icd
            # without an explicit LD_LIBRARY_PATH. Required for HDR->SDR tonemapping via
            # ffmpeg hwmap -> tonemap_opencl on RK3588.
            LD_LIBRARY_PATH: /usr/lib/aarch64-linux-gnu/mali
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 5Gi
          securityContext:
            appArmorProfile:
              type: Unconfined
            privileged: true
  ingress:
    main:
      enabled: false
      annotations:
        cert-manager.io/cluster-issuer: cluster-issuer-acme
        cert-manager.io/private-key-algorithm: ECDSA
        cert-manager.io/private-key-size: "384"
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
        - host: immich.bhyoo.com
          paths:
            - path: "/"
              service:
                identifier: main
      tls:
        - hosts:
            - immich.bhyoo.com
          secretName: immich-bhyoo-com
  route:
    main:
      enabled: true
      parentRefs:
        - name: bhyoo-gateway
          namespace: ingress-ctrl
          sectionName: https
      hostnames:
        - immich.bhyoo.com
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - identifier: main
              port: http
  persistence:
    rk-drivers:
      enabled: true
      type: hostPath
      hostPath: /dev/dri
    rk-rga:
      enabled: true
      type: hostPath
      hostPath: /dev/rga
    rk-dma-heap:
      enabled: true
      type: hostPath
      hostPath: /dev/dma_heap
    rk-dma-mpp-service:
      enabled: true
      type: hostPath
      hostPath: /dev/mpp_service
    rk-mali:
      enabled: true
      type: hostPath
      hostPath: /dev/mali0
    opencl:
      enabled: true
      type: hostPath
      hostPath: /etc/OpenCL
    libmali:
      enabled: true
      type: hostPath
      hostPath: /usr/lib/aarch64-linux-gnu/libmali.so.1
    mali-libs:
      enabled: true
      type: hostPath
      hostPath: /usr/lib/aarch64-linux-gnu/mali
    libmali-hook:
      enabled: true
      type: hostPath
      hostPath: /usr/lib/aarch64-linux-gnu/libmali-hook.so.1
    libxcb-dri2:
      enabled: true
      type: hostPath
      hostPath: /usr/lib/aarch64-linux-gnu/libxcb-dri2.so.0

machine-learning:
  enabled: true
  controllers:
    main:
      strategy: Recreate
      pod:
        nodeSelector:
          homelab.bhyoo.com/npu: rknn
      containers:
        main:
          image:
            repository: ghcr.io/isac322/immich-machine-learning
            # Keep in sync with persistence.patched-models.volumeSpec.image.reference
            tag: v3.0.3-rknn
          env:
            MACHINE_LEARNING_RKNN_THREADS: 3
          securityContext:
            appArmorProfile:
              type: Unconfined
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 12Gi
              rock-chips.com/rknpu: 1
          probes:
            liveness: &machineLearningProbes
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: http
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 10
                failureThreshold: 12
            readiness: *machineLearningProbes
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: http
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 10
                failureThreshold: 60
  persistence:
    cache:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          main:
            - {}
    patched-models:
      enabled: true
      type: custom
      volumeSpec:
        image:
          # Keep tag in sync with controllers.main.containers.main.image.tag above
          reference: ghcr.io/isac322/immich-patched-models:v3.0.3-rknn
          pullPolicy: IfNotPresent
      advancedMounts:
        main:
          main:
            - path: /cache/clip/nllb-clip-large-siglip__mrl/textual/rknpu
              subPath: clip/nllb-clip-large-siglip__mrl/textual/rknpu
              readOnly: true
            - path: /cache/clip/nllb-clip-large-siglip__mrl/visual/rknpu
              subPath: clip/nllb-clip-large-siglip__mrl/visual/rknpu
              readOnly: true
    rk-drivers:
      enabled: true
      type: hostPath
      hostPath: /dev/dri
      advancedMounts:
        main:
          main:
            - {}
