deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 8760h
    allow_structured_metadata: true
    volume_enabled: true
  chunk_store_config:
    chunk_cache_config:
      embedded_cache:
        enabled: true
        max_size_mb: 128
  query_range:
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 64
  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi
  persistence:
    enabled: true
    storageClass: ssd-ha-xfs
    accessModes:
      - ReadWriteOnce
    size: 100Gi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false

sidecar:
  resources:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 10m
      memory: 128Mi

gateway:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

lokiCanary:
  enabled: false

test:
  enabled: false

monitoring:
  dashboards:
    # Disabled: all Loki dashboards use read/write microservice job patterns
    # (e.g. loki-read, loki-write) which don't match SingleBinary mode (job=loki/loki)
    enabled: false
  rules:
    enabled: false
  serviceMonitor:
    enabled: true
