type: postgresql
mode: standalone
version:
  postgresql: "17"

nameOverride: immich

cluster:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.9-1.1.1
  storage:
    storageClass: ssd-ha-cnpg
    size: 10Gi
  walStorage:
    enabled: true
    storageClass: ssd-ha-cnpg
    size: 64Gi
  postgresql:
    shared_preload_libraries:
      - vchord.so
    parameters:
      wal_compression: zstd
  postgresUID: 26
  postgresGID: 999
  monitoring:
    enabled: true
    prometheusRule:
      excludeRules:
        # chart 0.6.0 PromQL syntax bug (ranges only allowed for vector selectors)
        - CNPGClusterLogicalReplicationErrorsCritical
        - CNPGClusterLogicalReplicationErrors
        - CNPGClusterLogicalReplicationStoppedCritical
        - CNPGClusterLogicalReplicationStopped

backups:
  enabled: true
  endpointURL: "http://versitygw.object-storage.svc:7070"
  provider: s3
  data:
    compression: gzip
    encryption: ''
  wal:
    compression: zstd
    maxParallel: 4
    encryption: ''
  secret:
    create: false
    name: immich-s3-creds
  s3:
    bucket: cnpg-immich-backup
    region: ap-northeast-2
  scheduledBackups:
    - name: daily-backup # Weekly on Sunday at midnight
      schedule: "0 0 0 * * 0" # Weekly on Sunday at midnight
      backupOwnerReference: self
  retentionPolicy: "30d"
