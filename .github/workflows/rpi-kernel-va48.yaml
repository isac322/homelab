name: RPi v8 kernel (VA_BITS=48)

# Builds a custom linux-image-rpi-v8 package with CONFIG_ARM64_VA_BITS=48
# whenever RPi publishes a new linux source version in their trixie archive.
#
# - daily schedule: checks the archive for a new source version
# - if a GitHub release for that version already exists, the workflow exits
#   without spending build minutes
# - otherwise it cross-builds and publishes a release with the resulting .deb
#   files attached as assets
#
# Manual trigger via workflow_dispatch always rebuilds against the current
# archive head, regardless of existing releases (force=true input).

on:
  schedule:
    # 00:00 UTC daily (≈ 09:00 KST)
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild even if a release for the current archive version already exists'
        type: boolean
        default: false

  push:
    branches:
      - master
    paths:
      - tools/rpi-kernel-va48/**
      - .github/workflows/rpi-kernel-va48.yaml

permissions:
  contents: write

jobs:
  check:
    name: Check for new RPi source version
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      latest_version: ${{ steps.check.outputs.latest_version }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Fetch latest RPi linux source version and compare with existing releases
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force }}
        # language=Bash
        run: |
          set -euo pipefail

          curl -sfL -m 30 \
            https://archive.raspberrypi.com/debian/dists/trixie/main/source/Sources.gz \
            -o /tmp/Sources.gz
          gunzip -c /tmp/Sources.gz > /tmp/Sources.txt
          LATEST=$(awk '/^Package: linux$/{found=1; next} found && /^Version:/{print $2; exit} /^$/{found=0}' /tmp/Sources.txt)
          [ -n "$LATEST" ] || { echo "FAIL: archive does not expose src:linux"; exit 1; }
          echo "Latest RPi source version: $LATEST"

          # Sanitize for use as a git tag: replace ':' and '+' (both legal in
          # Debian versions, illegal/unsafe in tag refs / release asset URLs).
          TAG_VER="${LATEST//:/-}"
          TAG_VER="${TAG_VER//+/-}"
          TAG="rpi-kernel-va48-${TAG_VER}"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "latest_version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

          if [ "${FORCE:-false}" = "true" ]; then
            echo "Force rebuild requested via workflow_dispatch"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists - skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist - will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Native arm64 build & publish release
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    env:
      BUILD_DIR: ${{ github.workspace }}/build-work
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build kernel packages
        # build.sh runs everything inside a `debian:trixie` container and
        # picks cross vs native automatically from the container's own arch.
        # language=Bash
        run: |
          set -ex
          bash tools/rpi-kernel-va48/build.sh

      - name: List artifacts
        # language=Bash
        run: |
          set -ex
          ls -la "$BUILD_DIR/out/"

      - name: Sanity check - VA_BITS=48 baked into the kernel config
        # language=Bash
        run: |
          set -ex
          IMAGE_DEB=$(ls "$BUILD_DIR"/out/linux-image-6.*+rpt-rpi-v8_*+isacva48.*_arm64.deb | head -1)
          tmp=$(mktemp -d)
          dpkg-deb -x "$IMAGE_DEB" "$tmp"
          CFG=$(ls "$tmp"/boot/config-* | head -1)
          grep -E '^CONFIG_ARM64_VA_BITS|^CONFIG_PGTABLE_LEVELS|^CONFIG_ARM64_4K_PAGES' "$CFG"
          grep -q '^CONFIG_ARM64_VA_BITS=48$' "$CFG"
          grep -q '^CONFIG_PGTABLE_LEVELS=4$' "$CFG"
          grep -q '^CONFIG_ARM64_4K_PAGES=y$' "$CFG"
          rm -rf "$tmp"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check.outputs.release_tag }}
          LATEST: ${{ needs.check.outputs.latest_version }}
        # language=Bash
        run: |
          set -ex

          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<'BODY_EOF'
          Custom RPi v8 kernel for rpi4 with `CONFIG_ARM64_VA_BITS=48`
          (PGTABLE_LEVELS=4, 4K pages preserved).

          Based on upstream raspberrypi/linux source version `__LATEST__`.
          Package names are identical to the official RPi packages so
          `dpkg -i` overwrites them in place. Version suffix
          `+isacva48.1` ranks higher than `+rpt1`.

          See [tools/rpi-kernel-va48/README.md](https://github.com/__REPO__/blob/master/tools/rpi-kernel-va48/README.md)
          for build details and the underlying rationale.

          ## Install on rpi4

          ### 1) Cache the stock build for offline downgrade

          One-time, idempotent — needed for recovery if the new kernel panics.

          ```bash
          # FAT32 backup of the currently-running kernel — accessible from
          # a rescue host even when rpi4 won't boot.
          sudo cp -n /boot/firmware/kernel8.img  /boot/firmware/kernel8.img.stable-backup
          sudo cp -n /boot/firmware/initramfs8   /boot/firmware/initramfs8.stable-backup

          # Package-level backup, used to repair the rootfs after a rescue boot.
          sudo mkdir -p /var/backups/rpi-stable
          cd /var/backups/rpi-stable
          sudo apt-get download \
            linux-image-rpi-v8 linux-base-rpi-v8 linux-headers-rpi-v8 \
            "linux-image-$(uname -r)" "linux-headers-$(uname -r)" "linux-base-$(uname -r)"
          ```

          ### 2) Install the custom build

          ```bash
          TAG="__TAG__"
          WORK=$(mktemp -d) && cd "$WORK"

          gh release download "$TAG" --repo __REPO__ --pattern '*.deb'
          rm -f *-dbg_*.deb linux-libc-dev_*.deb

          # Replace the metapackages.
          sudo apt-mark unhold linux-image-rpi-v8 linux-base-rpi-v8 linux-headers-rpi-v8 2>/dev/null || true

          sudo dpkg -i \
            linux-kbuild-*+rpt_*_arm64.deb \
            linux-headers-*+rpt-common-rpi_*_all.deb \
            linux-base-*+rpt-rpi-v8_*_arm64.deb \
            linux-headers-*+rpt-rpi-v8_*_arm64.deb \
            linux-image-*+rpt-rpi-v8_*_arm64.deb \
            linux-base-rpi-v8_*_arm64.deb \
            linux-headers-rpi-v8_*_arm64.deb \
            linux-image-rpi-v8_*_arm64.deb

          # Re-hold so apt cannot silently roll back to +rpt1 when RPi cuts
          # a new stable — the workflow publishes a fresh VA48 release on
          # its next daily run instead.
          sudo apt-mark hold linux-image-rpi-v8 linux-base-rpi-v8 linux-headers-rpi-v8

          # Verify VA_BITS=48 baked in + firmware copy matches /boot/vmlinuz-*.
          KVER=$(ls -1 /boot/config-*+rpt-rpi-v8 | sed 's,/boot/config-,,' | tail -1)
          grep '^CONFIG_ARM64_VA_BITS=' "/boot/config-$KVER"   # → 48
          md5sum /boot/firmware/kernel8.img "/boot/vmlinuz-$KVER"

          sudo reboot
          ```

          After reboot `uname -r` is unchanged (`+rpt-rpi-v8`); only
          `CONFIG_ARM64_VA_BITS=48` differs from the stock build.

          ## Recovery from a boot failure

          If the new kernel panics, RPi firmware has no automatic fallback.
          Power off, pull the microSD, and mount it externally on a rescue
          host.

          ### 1) Restore the stock kernel on the FAT32 boot partition

          ```bash
          cp kernel8.img.stable-backup  kernel8.img
          cp initramfs8.stable-backup   initramfs8
          sync
          ```

          ### 2) Boot rpi4 and reinstall the stock packages

          ```bash
          sudo apt-mark unhold linux-image-rpi-v8 linux-base-rpi-v8 linux-headers-rpi-v8
          sudo dpkg -i /var/backups/rpi-stable/*.deb
          ```
          BODY_EOF

          sed -i \
            -e "s|__LATEST__|${LATEST}|g" \
            -e "s|__TAG__|${TAG}|g" \
            -e "s|__REPO__|${GITHUB_REPOSITORY}|g" \
            "$NOTES_FILE"

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "RPi v8 kernel (VA_BITS=48) — ${LATEST}" \
            --notes-file "$NOTES_FILE" \
            "$BUILD_DIR"/out/*.deb
