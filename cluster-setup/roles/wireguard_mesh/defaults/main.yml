---

#######################################
# Global Settings
#######################################

# Example
# cidr_block: "10.0.0.0/16"
cidr_block: ""

# Example:
#
# mesh_group_config:
#   group_a:
#     ansible_groups: ['group_name1', 'group_name2']
#     ansible_hosts: ['host_name1']
#     cidr: "10.0.0.0/24"
#
#   group_b:
#     ansible_groups: ['group_name3']
#     gateway_host: 'host_name3'
#     cidr: "10.0.1.0/24"
mesh_group_config: {}

# Example:
#
# edges:
#   phone:
#     ip_address: 10.0.2.1
#     allowed_groups: ['group_b']
edges: {}


local_become: no
local_directory: "."

#######################################
# Host specific settings
#######################################

wireguard_ip_address: ""

# Extra CIDRs advertised to peers as AllowedIPs for THIS host (in addition to its
# mesh IP). Each peer appends these to the AllowedIPs of its peer entry for this
# host, so WireGuard routes/accepts those ranges to/from it. Use it to run a
# non-encapsulating CNI (e.g. flannel host-gw) over the mesh: set it to the node's
# pod CIDR so pod-IP traffic passes WireGuard cryptokey routing. CIDRs must not
# overlap across hosts (each maps to exactly one peer).
# Example: wireguard_extra_allowed_ips: ['10.42.0.0/24']
wireguard_extra_allowed_ips: []

# The default port WireGuard will listen if not specified otherwise.
wireguard_port: '51820'
wireguard_internal_port: '{{ wireguard_port }}'

# The default interface name that WireGuard should use if not specified otherwise.
wireguard_interface: "wg0"

wireguard_host: ""
wireguard_internal_host: '{{ wireguard_host }}'


#######################################
# Settings only relevant for Ubuntu
#######################################

# Set to "false" if package cache should not be updated
wireguard_ubuntu_update_cache: "true"

# Set package cache valid time
wireguard_ubuntu_cache_valid_time: "3600"
